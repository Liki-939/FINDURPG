version: "1"

services:
  - type: web
    name: findurpg-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "findurpg-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: findurpg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: findurpg-db
    databaseName: pg_saas_db
    user: liki_user
    plan: free
